<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#FFFFFF"/>
  <!-- corn cob body -->
  <rect x="64" y="44" width="72" height="120" rx="36" ry="36"
        fill="#FFD400" stroke="#0A0A0A" stroke-width="6"/>
  <!-- kernel grid -->
  <g fill="#0A0A0A">
    <circle cx="84"  cy="70" r="3.5"/><circle cx="100" cy="70" r="3.5"/><circle cx="116" cy="70" r="3.5"/>
    <circle cx="84"  cy="90" r="3.5"/><circle cx="100" cy="90" r="3.5"/><circle cx="116" cy="90" r="3.5"/>
    <circle cx="84"  cy="110" r="3.5"/><circle cx="100" cy="110" r="3.5"/><circle cx="116" cy="110" r="3.5"/>
    <circle cx="84"  cy="130" r="3.5"/><circle cx="100" cy="130" r="3.5"/><circle cx="116" cy="130" r="3.5"/>
  </g>
  <!-- husk leaves -->
  <path d="M 64 44 L 36 22 Q 50 50 64 60 Z" fill="#FFD400" stroke="#0A0A0A" stroke-width="5"/>
  <path d="M 136 44 L 164 22 Q 150 50 136 60 Z" fill="#FFD400" stroke="#0A0A0A" stroke-width="5"/>
</svg>
